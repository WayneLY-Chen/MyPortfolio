<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" width="120" height="150">
  <!-- Shadow -->
  <ellipse cx="60" cy="143" rx="26" ry="5" fill="rgba(0,0,0,0.12)"/>
  <!-- Open book dog holds -->
  <path d="M28 112 Q42 108 58 112 L58 130 Q42 126 28 130 Z" fill="#f5f0e8" stroke="#d4c9a8" stroke-width="1"/>
  <path d="M62 112 Q76 108 92 112 L92 130 Q76 126 62 130 Z" fill="#f5f0e8" stroke="#d4c9a8" stroke-width="1"/>
  <!-- Book spine -->
  <rect x="57" y="110" width="6" height="22" rx="1" fill="#a08040"/>
  <!-- Book lines text -->
  <line x1="31" y1="116" x2="55" y2="115" stroke="#b0a080" stroke-width="1" opacity="0.7"/>
  <line x1="31" y1="119" x2="55" y2="118" stroke="#b0a080" stroke-width="1" opacity="0.7"/>
  <line x1="31" y1="122" x2="55" y2="121" stroke="#b0a080" stroke-width="1" opacity="0.7"/>
  <line x1="65" y1="116" x2="89" y2="115" stroke="#b0a080" stroke-width="1" opacity="0.7"/>
  <line x1="65" y1="119" x2="89" y2="118" stroke="#b0a080" stroke-width="1" opacity="0.7"/>
  <line x1="65" y1="122" x2="89" y2="121" stroke="#b0a080" stroke-width="1" opacity="0.7"/>
  <!-- Long silky coat -->
  <path d="M30 80 Q25 106 31 122 Q60 130 89 122 Q95 106 90 80 Z" fill="#C8A04A"/>
  <!-- Dark steel-blue back -->
  <ellipse cx="60" cy="81" rx="24" ry="18" fill="#3E3D6B"/>
  <!-- Coat sides -->
  <path d="M36 86 Q32 108 38 120 Q60 126 82 120 Q88 108 84 86 Q73 91 60 91 Q47 91 36 86Z" fill="#D4A955" opacity="0.75"/>
  <!-- Both arms holding book -->
  <path d="M36 90 Q29 100 30 113" stroke="#D4A96B" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M84 90 Q91 100 90 113" stroke="#D4A96B" stroke-width="9" stroke-linecap="round" fill="none"/>
  <!-- Head chibi -->
  <ellipse cx="60" cy="50" rx="26" ry="24" fill="#D4A96B"/>
  <!-- Top fur -->
  <ellipse cx="60" cy="31" rx="18" ry="12" fill="#C8A04A"/>
  <!-- Ears -->
  <polygon points="34,43 37,20 49,39" fill="#3E3D6B"/>
  <polygon points="86,43 83,20 71,39" fill="#3E3D6B"/>
  <polygon points="36,42 39,25 48,39" fill="#D4A96B" opacity="0.85"/>
  <polygon points="84,42 81,25 72,39" fill="#D4A96B" opacity="0.85"/>
  <!-- Muzzle -->
  <ellipse cx="60" cy="60" rx="15" ry="12" fill="#F0CC8A"/>
  <!-- Eyes wide curious/reading -->
  <circle cx="48" cy="49" r="8" fill="#1a1106"/>
  <circle cx="72" cy="49" r="8" fill="#1a1106"/>
  <circle cx="50.5" cy="46" r="3" fill="white"/>
  <circle cx="74.5" cy="46" r="3" fill="white"/>
  <circle cx="49" cy="49" r="5" fill="#4a2c10" opacity="0.55"/>
  <circle cx="73" cy="49" r="5" fill="#4a2c10" opacity="0.55"/>
  <!-- Nose -->
  <ellipse cx="60" cy="62" rx="5" ry="4" fill="#1a1106"/>
  <ellipse cx="58.5" cy="61" rx="1.5" ry="1" fill="rgba(255,255,255,0.35)"/>
  <!-- Gentle smile -->
  <path d="M55 66 Q60 71 65 66" stroke="#1a1106" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Round reading glasses -->
  <circle cx="49" cy="51" r="9" fill="none" stroke="#8B6914" stroke-width="1.8"/>
  <circle cx="71" cy="51" r="9" fill="none" stroke="#8B6914" stroke-width="1.8"/>
  <line x1="58" y1="51" x2="62" y2="51" stroke="#8B6914" stroke-width="1.8"/>
  <line x1="40" y1="49" x2="36" y2="47" stroke="#8B6914" stroke-width="1.8"/>
  <line x1="80" y1="49" x2="84" y2="47" stroke="#8B6914" stroke-width="1.8"/>
  <!-- Purple ribbon/bow topknot -->
  <ellipse cx="52" cy="29" rx="7" ry="4.5" fill="#9B59F0" transform="rotate(-20,52,29)"/>
  <ellipse cx="68" cy="29" rx="7" ry="4.5" fill="#9B59F0" transform="rotate(20,68,29)"/>
  <circle cx="60" cy="29" r="4" fill="#7B2FE0"/>
  <!-- Paw peeking out (right) -->
  <ellipse cx="76" cy="120" rx="12" ry="8" fill="#D4A96B"/>
  <path d="M68 121 Q76 126 84 121" stroke="#C09040" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
